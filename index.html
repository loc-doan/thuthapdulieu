<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khảo sát nhanh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal-active { display: flex !important; }
        input:invalid { border-color: #ef4444; }
        input:valid { border-color: #e5e7eb; }
        /* Style cho dấu sao đỏ */
        .required-dot::after {
            content: " *";
            color: #ef4444;
            font-weight: bold;
        }
    </style>
</head>

<body class="bg-gray-50 py-10 px-4">
    <div class="max-w-xl mx-auto bg-white p-8 rounded-xl shadow-lg">
        <h2 class="text-2xl font-bold text-gray-800 mb-2 text-center">THU THẬP THÔNG TIN SINH VIÊN</h2>
        <p class="text-center text-gray-500 mb-6 text-sm italic">* Vui lòng nhập đúng định dạng để gửi bài</p>

        <form id="surveyForm" class="space-y-5">
            <div>
                <label class="block font-semibold italic text-blue-700 required-dot">Họ và tên:</label>
                <input type="text" name="hoTen" id="hoTen" required minlength="2"
                    placeholder="Ví dụ: Nguyễn Văn A"
                    class="w-full border p-2 rounded focus:ring-2 focus:ring-green-500 outline-none transition-all">
            </div>

            <hr>

            <div>
                <label class="block font-semibold italic text-blue-700 required-dot">Số điện thoại:</label>
                <input type="tel" name="cau1" id="sdt" required 
                    placeholder="Ví dụ: 0912345678"
                    inputmode="numeric"
                    class="w-full border p-2 rounded focus:ring-2 focus:ring-green-500 outline-none transition-all">
                <p id="phoneError" class="text-red-500 text-xs mt-1 hidden">Số điện thoại phải là 10 số và bắt đầu bằng số 0</p>
            </div>

            <div>
                <label class="block font-semibold italic text-blue-700 required-dot">Chuyên ngành:</label>
                <input type="text" name="cau2" required
                    placeholder="Ví dụ: Kế toán, CNTT..."
                    class="w-full border p-2 rounded focus:ring-2 focus:ring-green-500 outline-none">
            </div>

            <div>
                <label class="block font-semibold italic text-blue-700 required-dot">Tháng dự kiến (Tháng/Năm):</label>
                <input type="text" name="cau3" id="thangDuKien" required
                    placeholder="Ví dụ: 5/2026"
                    class="w-full border p-2 rounded focus:ring-2 focus:ring-green-500 outline-none transition-all">
                <p id="dateError" class="text-red-500 text-xs mt-1 hidden">Định dạng Tháng/Năm không hợp lệ hoặc ở quá khứ</p>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 transition active:scale-95 disabled:bg-gray-400">
                Gửi thông tin
            </button>
        </form>
    </div>

    <div id="successModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-xl p-8 max-w-sm w-full text-center shadow-2xl">
            <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <h3 class="text-xl font-bold text-gray-900 mb-2">Thành công!</h3>
            <p class="text-gray-600 mb-6">Dữ liệu của bạn đã được cập nhật vào hệ thống.</p>
            <button onclick="closeModal()" class="w-full bg-gray-800 text-white font-bold py-2 rounded-lg hover:bg-black">Đóng</button>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyQ1HmcxPut7TxfM5yH66A_AsimS5qsMez9eUhf7v5huoUuL1XGOtN95jXXJycj2vQ/exec';
        const form = document.getElementById('surveyForm');
        const btn = document.getElementById('submitBtn');
        const modal = document.getElementById('successModal');
        const inputHoTen = document.getElementById('hoTen');
        const inputSdt = document.getElementById('sdt');
        const inputThang = document.getElementById('thangDuKien');

        inputHoTen.addEventListener('input', (e) => {
            let words = e.target.value.split(' ');
            let capitalizedWords = words.map(word => {
                if (word.length === 0) return "";
                return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
            });
            e.target.value = capitalizedWords.join(' ');
        });

        function validateDate(value) {
            const regex = /^([1-9]|1[0-2])\/[0-9]{4}$/;
            if (!regex.test(value)) return false;

            const parts = value.split('/');
            const inputMonth = parseInt(parts[0], 10);
            const inputYear = parseInt(parts[1], 10);

            const now = new Date();
            const currentMonth = now.getMonth() + 1;
            const currentYear = now.getFullYear();

            if (inputYear < currentYear) return false;
            if (inputYear === currentYear && inputMonth < currentMonth) return false;

            return true;
        }

        form.addEventListener('submit', e => {
            e.preventDefault();
            let isValid = true;

            const vnf_regex = /((09|03|07|08|05)+([0-9]{8})\b)/;
            if (!vnf_regex.test(inputSdt.value)) {
                document.getElementById('phoneError').classList.remove('hidden');
                isValid = false;
            } else {
                document.getElementById('phoneError').classList.add('hidden');
            }

            if (!validateDate(inputThang.value)) {
                document.getElementById('dateError').classList.remove('hidden');
                isValid = false;
            } else {
                document.getElementById('dateError').classList.add('hidden');
            }

            if (!isValid) return;

            btn.disabled = true;
            btn.innerText = "Đang gửi...";

            const formData = new FormData(form);
            const sdtGoc = formData.get('cau1');
            formData.set('cau1', "'" + sdtGoc);

            fetch(scriptURL, { method: 'POST', body: formData })
                .then(response => {
                    modal.classList.add('modal-active');
                    form.reset();
                    btn.disabled = false;
                    btn.innerText = "Gửi thông tin";
                })
                .catch(error => {
                    alert("Lỗi kết nối! Vui lòng thử lại.");
                    btn.disabled = false;
                    btn.innerText = "Gửi lại";
                });
        });

        function closeModal() {
            modal.classList.remove('modal-active');
        }
    </script>
</body>
</html>
